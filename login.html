<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Interview</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-body">

<div class="auth-container">

    <!-- LEFT PANEL -->
    <div class="auth-left">
    </div>
    <!-- RIGHT PANEL -->
    <div class="auth-right">

        <!-- LOGIN FORM -->
        <div id="loginForm" class="auth-box">
            <h2>Sign In</h2>

            <input type="email" id="loginEmail" placeholder="Email address">
            <input type="password" id="loginPassword" placeholder="Password">

            <button onclick="login()">Sign In</button>

            <div class="divider">OR</div>

            <button class="google-btn">Continue with Google</button>

            <p class="switch">
                Don't have an account?
                <span onclick="showRegister()">Create account</span>
            </p>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="auth-box" style="display:none;">
            <h2>Create Account</h2>

            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="course" placeholder="Course (B.Tech CSE)">
            <input type="password" id="password" placeholder="Password">

            <button onclick="register()">Register</button>

            <p class="switch">
                Already have an account?
                <span onclick="showLogin()">Sign In</span>
            </p>
        </div>

    </div>

</div>

<script>

// SWITCH FORMS
function showRegister(){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin(){
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}

// LOGIN
async function login(){
    let res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: loginEmail.value,
            password: loginPassword.value
        })
    });

    let data = await res.json();

    if(data.msg === "ok"){
        window.location.href = "/interview";
    } else {
        alert("Invalid email or password");
    }
}

// REGISTER
async function register(){

    if(!name.value || !email.value || !course.value || !password.value){
        alert("Please fill all fields");
        return;
    }

    let res = await fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: email.value,
            password: password.value,
            name: name.value,
            course: course.value
        })
    });

    let data = await res.json();

    if(data.msg === "ok"){
        alert("Account created successfully!");
        showLogin();
    } else {
        alert("User already exists");
    }
}

</script>

</body>
</html>
